<!DOCTYPE html>

<html>
    <head>
        <title>Volunteer Registration</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            :root {
                --color-primary: #00A99D;
                --color-primary-dark: #00877D;
                --color-primary-light: #E5F7F5;

                --color-bg: #F7F8FA;
                --color-surface: #FFFFFF;
                --color-text: #1A1A1A;
                --color-text-muted: #6B7280;
                --color-border: #E5E7EB;

                --color-success: #22C55E;
                --color-success-bg: #ECFDF5;
                --color-danger: #EF4444;
                --color-danger-bg: #FEF2F2;
                --color-info: #3B82F6;
                --color-info-bg: #EFF6FF;

                --radius-card: 16px;
                --radius-button: 12px;
                --radius-input: 10px;
                --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
                --max-width: 640px;
            }

            * {
box-sizing: border-box;
}

            body {
                margin: 0;
                font-family: "Poppins", "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
                background: var(--color-bg);
                color: var(--color-text);
                line-height: 1.55;
                padding: 32px 16px 64px;
            }

            .topbar {
                max-width: var(--max-width);
                margin: 0 auto 24px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .topbar .brand {
                font-weight: 700;
                font-size: 1.1rem;
                color: var(--color-primary-dark);
                text-decoration: none;
            }

            .page {
max-width: var(--max-width);
margin: 0 auto;
}

            .card {
                background: var(--color-surface);
                border-radius: var(--radius-card);
                box-shadow: var(--shadow-card);
                padding: 32px;
            }

            h1 {
font-size: 1.5rem;
font-weight: 700;
margin: 0 0 8px;
color: var(--color-text);
}
            h2 {
font-size: 1.1rem;
font-weight: 600;
margin: 24px 0 8px;
color: var(--color-text);
}
            p {
color: var(--color-text-muted);
margin: 0 0 16px;
}
            hr {
border: none;
border-top: 1px solid var(--color-border);
margin: 20px 0;
}

            .links-row {
font-size: 0.9rem;
margin-bottom: 8px;
}

            a {
color: var(--color-primary);
text-decoration: none;
font-weight: 500;
}
            a:hover {
color: var(--color-primary-dark);
text-decoration: underline;
}

            ul {
list-style: none;
padding: 0;
margin: 0 0 8px;
display: grid;
gap: 10px;
}

            ul li a {
                display: block;
                background: var(--color-primary-light);
                border: 1px solid transparent;
                border-radius: var(--radius-button);
                padding: 14px 16px;
                font-weight: 600;
                color: var(--color-primary-dark);
                transition: background 0.15s ease, border-color 0.15s ease;
            }

            ul li a:hover {
background: var(--color-surface);
border-color: var(--color-primary);
text-decoration: none;
}

            form table {
width: 100%;
border-collapse: collapse;
}
            form table tr {
display: block;
margin-bottom: 16px;
}
            form table td {
display: block;
width: 100%;
padding: 0;
}
            form table td label {
display: block;
font-size: 0.85rem;
font-weight: 600;
color: var(--color-text);
margin-bottom: 6px;
}

            input, select, textarea {
                width: 100%;
                font-family: inherit;
                font-size: 0.95rem;
                padding: 11px 14px;
                border: 1px solid var(--color-border);
                border-radius: var(--radius-input);
                background: var(--color-bg);
                color: var(--color-text);
                transition: border-color 0.15s ease, box-shadow 0.15s ease;
            }

            input:focus, select:focus, textarea:focus {
                outline: none;
                border-color: var(--color-primary);
                box-shadow: 0 0 0 3px var(--color-primary-light);
                background: var(--color-surface);
            }

            textarea {
resize: vertical;
min-height: 90px;
}

            button[type="submit"], button {
                appearance: none;
                border: none;
                background: var(--color-primary);
                color: #fff;
                font-weight: 600;
                font-size: 0.95rem;
                padding: 12px 24px;
                border-radius: var(--radius-button);
                cursor: pointer;
                transition: background 0.15s ease, transform 0.05s ease;
            }

            button[type="submit"]:hover, button:hover {
background: var(--color-primary-dark);
}
            button[type="submit"]:active, button:active {
transform: scale(0.98);
}

            input[type="reset"] {
                appearance: none;
                width: auto;
                background: transparent;
                color: var(--color-text-muted);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-button);
                padding: 12px 20px;
                font-weight: 600;
                margin-left: 10px;
                cursor: pointer;
            }

            input[type="reset"]:hover {
border-color: var(--color-text-muted);
color: var(--color-text);
}

            #status-container p, #statusMessage p {
                margin: 0 0 16px;
                padding: 12px 16px;
                border-radius: var(--radius-input);
                font-size: 0.9rem;
                color: var(--color-text);
                border: 1px solid transparent;
            }

            #status-container p.msg-success {
background: var(--color-success-bg);
border-color: var(--color-success);
}
            #status-container p.msg-info {
background: var(--color-info-bg);
border-color: var(--color-info);
}
            #status-container p.msg-error {
background: var(--color-danger-bg);
border-color: var(--color-danger);
}

            .footer-note {
text-align: center;
margin-top: 24px;
font-size: 0.8rem;
color: var(--color-text-muted);
}

            @media (max-width: 480px) {
                .card {
padding: 24px 20px;
}
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <a class="brand" href="index.html">E-Sukarelawan</a>
        </div>

        <div class="page">
            <div class="card">
                <h1>Volunteer Registration</h1>
                <p>Join E-Sukarelawan to register for CSR events and track your volunteer hours.</p>
                <p class="links-row"><a href="index.html">Back to Home</a> &nbsp;|&nbsp; <a href="v-login.html">Already have an account? Login here</a></p>
                <hr>

                <!-- Submits back one folder level to RegisterVolunteerServlet -->
                <form action="../RegisterVolunteerServlet" method="POST">
                    <table>
                        <tr>
                            <td><label for="studentId">Student ID (Numbers Only):</label></td>
                            <td><input type="number" id="studentId" name="studentId" required placeholder="e.g., 20261234"></td>
                        </tr>
                        <tr>
                            <td><label for="fullName">Full Name:</label></td>
                            <td><input type="text" id="fullName" name="fullName" required placeholder="e.g., John Doe"></td>
                        </tr>
                        <tr>
                            <td><label for="volunteerEmail">Email Address:</label></td>
                            <td><input type="email" id="volunteerEmail" name="volunteerEmail" required placeholder="e.g., student@university.edu"></td>
                        </tr>
                        <tr>
                            <td><label for="phoneNum">Phone Number (Numbers Only):</label></td>
                            <td><input type="number" id="phoneNum" name="phoneNum" required placeholder="e.g., 60123456789"></td>
                        </tr>
                        <tr>
                            <td><label for="course">Course / Programme:</label></td>
                            <td><input type="text" id="course" name="course" required placeholder="e.g., Computer Science"></td>
                        </tr>
                        <tr>
                            <td><label for="volunteerAddress">Home Address:</label></td>
                            <td><textarea id="volunteerAddress" name="volunteerAddress" rows="4" cols="30" required placeholder="Enter full address..."></textarea></td>
                        </tr>
                        <tr>
                            <td><label for="volunteerPassword">Password:</label></td>
                            <td><input type="password" id="volunteerPassword" name="volunteerPassword" required></td>
                        </tr>
                        <tr>
                            <td><label for="confirmPassword">Confirm Password:</label></td>
                            <td><input type="password" id="confirmPassword" name="confirmPassword" required></td>
                        </tr>
                        <tr>
                        <tr>
                            <td></td>
                            <td><button type="submit">Submit Registration</button><input type="reset" value="Clear Form" /></td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
    </body>
</html>
