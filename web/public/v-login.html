<html>
    <head>
        <title>Volunteer Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="status-container"></div>

        <script>
            // Inline JavaScript to check URL parameter markers on load
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            const error = urlParams.get('error');
            const container = document.getElementById('status-container');

            if (status === 'registered') {
                container.innerHTML = '<p><b>[SUCCESS]: Registration completed successfully! Please log in below.</b></p><hr>';
            } else if (status === 'logged_out') {
                container.innerHTML = '<p><b>[INFO]: You have been logged out securely.</b></p><hr>';
            }

            if (error === 'invalid_credentials') {
                container.innerHTML = '<p><b>[ERROR]: Invalid Email or Password. Please try again.</b></p><hr>';
            } else if (error === 'session_expired') {
                container.innerHTML = '<p><b>[ERROR]: Security session expired or unauthenticated. Please log in.</b></p><hr>';
            }
        </script>
        
        <h1>Volunteer Login</h1>
    <p>Enter your student credentials to manage registrations and verify hours.</p>
    <a href="index.html">Back to Home</a> | <a href="v-register.html">Need an account? Register here</a>
    <hr>


    <!-- Submits back one folder level to VolunteerLoginServlet -->
    <form action="../VolunteerLoginServlet" method="POST">
        <table>
            <tr>
                <td><label for="volunteerEmail">Email Address:</label></td>
                <td><input type="email" id="volunteerEmail" name="volunteerEmail" required></td>
            </tr>
            <tr>
                <td><label for="volunteerPassword">Password:</label></td>
                <td><input type="password" id="volunteerPassword" name="volunteerPassword" required></td>
            </tr>
            <tr>
                <td></td>
                <td><button type="submit">Login</button></td>
            </tr>
        </table>
    </form>

    </body>
</html>
